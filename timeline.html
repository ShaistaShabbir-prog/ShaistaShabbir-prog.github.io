<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Research Journey — Shaista Shabbir</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    :root { --primary:#7c3aed; --accent:#a78bfa; --bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
    nav { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; gap:2rem; align-items:center; }
    nav a { color:var(--muted); text-decoration:none; font-size:0.9rem; }
    nav a:hover { color:var(--accent); }
    nav .logo { color:var(--text); font-weight:700; font-size:1.1rem; margin-right:auto; }
    .hero { padding:3rem 2rem; text-align:center; background:linear-gradient(135deg,#0d1117,#1a0a2e); border-bottom:1px solid var(--border); }
    .hero h1 { font-size:2rem; background:linear-gradient(135deg,var(--accent),#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hero p { color:var(--muted); margin-top:0.5rem; }
    #timeline-container { width:100%; overflow-x:auto; padding:2rem 1rem; }
    svg text { font-family:'Segoe UI',sans-serif; }
    .tooltip { position:fixed; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1rem; pointer-events:none; opacity:0; transition:opacity 0.2s; max-width:280px; box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:999; }
    .tooltip h3 { color:var(--accent); font-size:0.9rem; margin-bottom:0.4rem; }
    .tooltip p { color:var(--muted); font-size:0.8rem; line-height:1.5; }
    .tooltip .badge { display:inline-block; padding:0.15rem 0.5rem; border-radius:4px; font-size:0.72rem; margin-top:0.4rem; }
    .legend { display:flex; gap:1.5rem; justify-content:center; flex-wrap:wrap; padding:1rem; }
    .legend-item { display:flex; align-items:center; gap:0.4rem; font-size:0.82rem; color:var(--muted); }
    .legend-dot { width:12px; height:12px; border-radius:50%; }
    footer { text-align:center; padding:2rem; color:var(--muted); font-size:0.85rem; border-top:1px solid var(--border); margin-top:2rem; }
  </style>
</head>
<body>
<nav>
  <span class="logo">Shaista Shabbir</span>
  <a href="index.html">Home</a>
  <a href="publications.html">Publications</a>
  <a href="cv.html">CV</a>
  <a href="blog.html">Blog</a>
</nav>
<div class="hero">
  <h1>📅 Research Journey</h1>
  <p>From Gold Medal BSCS in Pakistan to Industrial AI Research in Germany</p>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div> Education</div>
  <div class="legend-item"><div class="legend-dot" style="background:#0ea5e9"></div> Research</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> Teaching</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Award</div>
</div>
<div id="timeline-container"></div>
<div class="tooltip" id="tooltip"></div>
<footer>Shaista Shabbir · Research Associate · TU Dortmund · Lamarr Institute</footer>
<script>
const events = [
  { year:2012, label:"BSCS @ UMSIT Kotli", type:"education", desc:"Started Bachelor of Science in Computer Science at University of Muzaffarabad Science and Information Technology, Kotli AJK.", detail:"CGPA: 3.98/4.0 · 4-year degree" },
  { year:2014, label:"Web Dev Internship", type:"research", desc:"Internship at Arfa Kareem IT Institute — web development, PHP, MySQL.", detail:"Practical software development training" },
  { year:2015, label:"🏸 Badminton Champion ×3", type:"award", desc:"Three consecutive badminton championships at university — singles and doubles.", detail:"UMSIT · 2013, 2014, 2015" },
  { year:2016, label:"🥇 Gold Medal BSCS", type:"award", desc:"Graduated 1st in class with Gold Medal. CGPA 3.98. Final Year Project: Arms Licensing System Kotli (ALSK).", detail:"University of AJK · 1st Position" },
  { year:2016, label:"Permanent Lecturer", type:"teaching", desc:"Appointed as permanent Computer Science lecturer at University of Kotli AJK. Courses: Programming, Database, Networking.", detail:"University of Kotli AJK" },
  { year:2017, label:"MSCS @ Virtual University", type:"education", desc:"Started Master of Science in Computer Science at Virtual University of Pakistan — part-time alongside teaching.", detail:"Focus: AI, Software Engineering" },
  { year:2019, label:"CS Lecturer @ UOKAJK", type:"teaching", desc:"Computer Science Lecturer at University of Kotli AJK. Teaching: OOP, AI, Database Systems, Software Engineering.", detail:"University of Kotli AJK" },
  { year:2020, label:"MA Education @ AIOU", type:"education", desc:"Master of Arts in Education at Allama Iqbal Open University, Islamabad.", detail:"Pedagogy, Curriculum Design" },
  { year:2022, label:"DAAD Scholarship 🎓", type:"award", desc:"Received fully-funded DAAD scholarship to Germany — German Academic Exchange Service.", detail:"Competitive international scholarship" },
  { year:2022, label:"Research Assistant @ HITeC", type:"research", desc:"Research Assistant at HITeC / University of Hamburg. Projects: CoyPu, EVASST, DigitalCurri, EWIVIKIS.", detail:"Prof. Dr. Ricardo Usbeck" },
  { year:2023, label:"A.L.E.R.T System", type:"research", desc:"Built A.L.E.R.T — civil event detection for Hamburg using BERT & RoBERTa. Supervised by Prof. Dr. Usbeck.", detail:"RoBERTa: 89% accuracy · Macro F1=0.79" },
  { year:2025, label:"Research Associate @ TU Dortmund", type:"research", desc:"Research Associate at TU Dortmund University & Lamarr Institute for ML and AI. Chair: Virtual Machining.", detail:"Industrial AI · Chatter Detection · XAI · NOW" },
];

const width = Math.max(window.innerWidth - 40, 900);
const height = 300;
const margin = { left: 60, right: 60 };
const colors = { education:"#7c3aed", research:"#0ea5e9", teaching:"#10b981", award:"#f59e0b" };

const svg = d3.select("#timeline-container")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

const minYear = 2011, maxYear = 2026;
const x = d3.scaleLinear().domain([minYear, maxYear]).range([margin.left, width - margin.right]);

// Background gradient
const defs = svg.append("defs");
const grad = defs.append("linearGradient").attr("id","bg").attr("x1","0").attr("x2","1");
grad.append("stop").attr("offset","0%").attr("stop-color","#0d1117");
grad.append("stop").attr("offset","100%").attr("stop-color","#1a0a2e");
svg.append("rect").attr("width",width).attr("height",height).attr("fill","url(#bg)");

// Grid lines for years
for (let y = minYear; y <= maxYear; y++) {
  if (y % 2 === 0) {
    svg.append("line")
      .attr("x1", x(y)).attr("x2", x(y))
      .attr("y1", 20).attr("y2", height - 20)
      .attr("stroke","#1e293b").attr("stroke-width",1).attr("stroke-dasharray","4,4");
    svg.append("text")
      .attr("x", x(y)).attr("y", height - 5)
      .attr("text-anchor","middle").attr("font-size","11")
      .attr("fill","#4b5563").text(y);
  }
}

// Main timeline line
svg.append("line")
  .attr("x1", x(minYear)).attr("x2", x(maxYear))
  .attr("y1", height/2).attr("y2", height/2)
  .attr("stroke","#30363d").attr("stroke-width",2);

// Gradient line (progress)
const lineGrad = defs.append("linearGradient").attr("id","line-grad").attr("x1","0").attr("x2","1");
lineGrad.append("stop").attr("offset","0%").attr("stop-color","#7c3aed").attr("stop-opacity","0.3");
lineGrad.append("stop").attr("offset","80%").attr("stop-color","#a78bfa").attr("stop-opacity","0.8");
lineGrad.append("stop").attr("offset","100%").attr("stop-color","#ec4899");
svg.append("line")
  .attr("x1", x(2012)).attr("x2", x(2025))
  .attr("y1", height/2).attr("y2", height/2)
  .attr("stroke","url(#line-grad)").attr("stroke-width",3);

// NOW marker
svg.append("circle").attr("cx",x(2025)).attr("cy",height/2).attr("r",8).attr("fill","#ec4899");
svg.append("text").attr("x",x(2025)).attr("y",height/2-14).attr("text-anchor","middle")
  .attr("fill","#ec4899").attr("font-size","10").attr("font-weight","700").text("NOW");

// Events
const tooltip = document.getElementById("tooltip");
const positions = {}; // track vertical positions to avoid overlap
events.forEach((ev, i) => {
  const cx = x(ev.year);
  const above = i % 2 === 0;
  const cy = above ? height/2 - 60 : height/2 + 60;
  const color = colors[ev.type];

  svg.append("line")
    .attr("x1",cx).attr("x2",cx)
    .attr("y1",height/2).attr("y2",cy)
    .attr("stroke",color).attr("stroke-width",1.5).attr("stroke-opacity",0.6);

  const g = svg.append("g").style("cursor","pointer")
    .on("mousemove", function(event) {
      tooltip.style.opacity = "1";
      tooltip.style.left = (event.clientX + 15) + "px";
      tooltip.style.top = (event.clientY - 10) + "px";
      tooltip.innerHTML = `<h3>${ev.label}</h3><p>${ev.desc}</p>
        <span class="badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${ev.detail}</span>`;
    })
    .on("mouseleave", function() { tooltip.style.opacity = "0"; });

  g.append("circle").attr("cx",cx).attr("cy",height/2).attr("r",7)
    .attr("fill",color).attr("stroke","#0d1117").attr("stroke-width",2);

  const fo = g.append("foreignObject")
    .attr("x", cx - 55).attr("y", above ? cy - 30 : cy)
    .attr("width", 110).attr("height", 32);
  fo.append("xhtml:div")
    .style("font-size","10px").style("text-align","center")
    .style("color","#c9d1d9").style("line-height","1.3")
    .text(ev.label);
});
</script>
</body>
</html>
